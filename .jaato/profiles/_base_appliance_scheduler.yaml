# Tier-1 base for the 'appliance_scheduler' stage — PROVIDER-AGNOSTIC.
# Holds stage determinism (no tools, single analysis turn).
# Active model + provider live in profiles/<set>/appliance_scheduler.yaml,
# selected by JAATO_PROFILE_SET.  This base MUST stay inherit-able
# (do not bind a provider/model here — that breaks set-selection).
name: _base_appliance_scheduler
description: appliance-scheduling stage (base; bind provider/model in a set).
plugins: []  # no tools — works from data embedded in the prompt
max_turns: 1  # single analysis turn; ends naturally (no signal_completion)
suppress_base_instructions: true  # narrow goal-focused agent; persona is enough
