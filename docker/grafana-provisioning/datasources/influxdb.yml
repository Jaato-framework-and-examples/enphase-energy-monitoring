apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    editable: true
    jsonData:
      version: Flux
      organization: energy_monitoring
      defaultBucket: home_energy
      httpMode: POST
    secureJsonData:
      token: enphase-monitoring-token
